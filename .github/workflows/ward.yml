name: Ward Security Scan
on: [push, pull_request]

permissions:
  contents: read
  security-events: write

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Ward
        run: go install github.com/eljakani/ward@latest

      - name: Add Go bin to PATH
        run: echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Run Ward
        run: ward scan . --output json

      - name: Convert to SARIF
        uses: advanced-security/sarif-convert@v1
        with:
          input: ward-report.json
          output: ward-report.sarif
          tool-name: Ward

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ward-report.sarif